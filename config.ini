[GLOBAL]
body_size_limit = 10M
list = FALSE



[ouioui]
port = 8080
host = 127.0.0.1
name = S_A
default = TRUE
default_error_page = /error_path/error.html
body_size_limit = 100M

[ouioui:ERROR]
404 = /error_path/server_1/404.html
500 = /error_path/server_1/500.html

[ouioui:CGI]
cgi_path = /cgi-bin
cgi_type = .py .php .cgi .pl

[ouioui:UPLOAD] //from server to client
upload_path = /dl /other/path/to/upload
force_upload = TRUE

[ouioui:COOKIE]
allow = TRUE

[ouioui:ROUTES]
route1_path = /path/to/page
route1_root = /path/on/server
route1_default = index.html
route1_methods = GET
route1_list = TRUE
route1_download = TRUE
route1_download_path = /path/to/download //from client to server

route2_path = /path2
route2_default = default.html
route2_methods = GET POST DELETE
route2_redir = /path/to/page


[SERVER_2]
port = 8080
host = localhost
name = S_B
default = FALSE
default_error_page = /error_path/error.html


cduffaut:

set body size

set method (GET POST DELETE)

set bool

set string



ade-oli

set ipv4

set port

set file_string (make sure file exists and is readable)

set directory_string (make sure directory exists and is readable)

set cgi_extension (make sure it starts with a dot and valid name)
