[GLOBAL]
body_size_limit = 10M
list = FALSE


[SERVER_1]
port = 8080
host = 127.0.0.1
name = S_A
default = TRUE
default_error_page = /error_path/error.html
body_size_limit = 100M

[SERVER_1:ERROR]
404 = /error_path/server_1/404.html
500 = /error_path/server_1/500.html

[SERVER_1:CGI]
cgi_path = /cgi-bin
cgi_type = .py .php .cgi .pl

[SERVER_1:UPLOAD] //from server to client
upload_path = /dl /other/path/to/upload
force_upload = TRUE

[SERVER_1:COOKIE]
allow = TRUE

[SERVER_1:ROUTES:1]
path = /path/to/page
root = /path/on/server
default = index.html
methods = GET
list = TRUE
download = TRUE
download_path = /path/to/download //from client to server

[SERVER_1:ROUTES:2]
path = /path2
default = default.html
methods = GET POST DELETE
redir = /path/to/page


[SERVER_2]
port = 8080
host = localhost
name = S_B
default = FALSE
default_error_page = /error_path/error.html
