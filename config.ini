[SERVER_1]
port = 8080
host = 127.0.0.1
name = S_A
default = TRUE
default_error_page = www/webpages/index.html
max_body_size = 100M
cookies = TRUE
upload_routes = /dl /other/path/to/upload
force_upload = TRUE

[SERVER_1:ERROR]
404 = /error_path/server_1/404.html
500 = /error_path/server_1/500.html

[SERVER_1:ROUTES:ROUTE_1]
route = /
root = www/webpages/
default_page = www/webpages/index.html
methods = GET
listing = TRUE
download = TRUE
download_dir = www/webpages/download
cgi = .py .php .cgi .pl

[SERVER_1:ROUTES:ROUTE_2]
route = /oui
root = www/webpages/
default_page = www/webpages/index.html
methods = GET POST DELETE
redir = TRUE
redir_route = /
cgi = .pl

[SERVER_2]
port = 8081
host = 127.0.0.1
name = S_A
default = TRUE
default_error_page = www/webpages/index.html
max_body_size = 100M
cookies = TRUE
upload_routes = /dl /other/path/to/upload
force_upload = TRUE
