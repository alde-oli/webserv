<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Formulaire de Téléversement Multiple</title>
</head>
<body>
    <h2>Téléversement de Plusieurs Fichiers</h2>
    <form action="URL_CIBLE" method="post" enctype="multipart/form-data">
        <label for="fileUpload1">Choisir le fichier 1 :</label>
        <input type="file" id="fileUpload1" name="fileUpload1"><br><br>

        <label for="fileUpload2">Choisir le fichier 2 :</label>
        <input type="file" id="fileUpload2" name="fileUpload2"><br><br>

        <label for="fileUpload2">Choisir le fichier 3 :</label>
        <input type="file" id="fileUpload3" name="fileUpload3"><br><br>

        <label for="fileUpload3">Choisir le fichier 4 :</label>
        <input type="file" id="fileUpload4" name="fileUpload4"><br><br>

        <input type="submit" value="Téléverser">
    </form>

    <h2>Upload Images</h2>
    <form action="upload.php" method="post" enctype="multipart/form-data">
        <label for="imageUpload">Choose an image:</label>
        <input type="file" id="imageUpload" name="imageUpload" accept="image/*"><br><br>

        <input type="submit" value="Upload">
    </form>
</body>
</html>
